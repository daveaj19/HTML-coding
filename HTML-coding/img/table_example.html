<!DOCTYPE html>

<html>
    <head>
        <title> Tables Examples </title>
    </head>

    <body>
        <h1> HTML Tables </h1>
        <table border="1">
            <tr>
                <th>Days</th>
                <th>Weather</th>
            </tr>
            <tr>
                <td>Monday</td>
                <td>Sunny</td>
            </tr>
            <tr>
                <td>Tuesday</td>
                <td>Rainy</td>
            </tr>
        </table>
    </body>
</html>
